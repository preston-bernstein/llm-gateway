# Copy to config.yaml and uncomment/add the models you want to serve.
# All api_key values must use os.environ/<VAR> — never hardcode keys here.

model_list:
  - model_name: gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  # frontier tier — maximum accuracy
  - model_name: claude-opus-4-8
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY

  # RunPod serverless (big open-weights, mid tier). Fill endpoint id + model.
  - model_name: runpod/qwen2.5-72b
    litellm_params:
      model: openai/qwen2.5-72b-instruct
      api_base: https://api.runpod.ai/v2/RUNPOD_ENDPOINT_ID/openai/v1
      api_key: os.environ/RUNPOD_API_KEY

  # Local Ollama — adjust api_base to match your broker port
  - model_name: ollama/qwen2.5
    litellm_params:
      model: ollama/qwen2.5
      api_base: http://127.0.0.1:11435

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: "sqlite:////var/lib/litellm/litellm.db"

litellm_settings:
  request_timeout: 120
  drop_params: true
