# Copy to config.yaml and uncomment/add the models you want to serve.
# All api_key values must use os.environ/<VAR> — never hardcode keys here.

model_list:
  - model_name: gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  # Local Ollama — adjust api_base to match your broker port
  - model_name: ollama/qwen2.5
    litellm_params:
      model: ollama/qwen2.5
      api_base: http://127.0.0.1:11435

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: "sqlite:////var/lib/litellm/litellm.db"

litellm_settings:
  request_timeout: 120
  drop_params: true
